kind = "web"
previewPath = "/"
title = "CampusEats"
version = "1.0.0"
id = "artifacts/campuseats"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18379

[services.development]
run = "pnpm --filter @workspace/campuseats run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campuseats", "run", "build" ]
publicDir = "artifacts/campuseats/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18379"
BASE_PATH = "/"
